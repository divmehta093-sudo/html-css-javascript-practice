<body>
    <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      background: black;
    }
    .container {
      background: rgb(155, 153, 153);
      display: grid;
      width: 1000px;
      height: 600px;
      margin: 20px auto;
      row-gap: 10px;
      column-gap: 10px;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 100px) 150px;

       grid-template-areas:
       
       "header header header"
       "menu menu menu"
       "box1 box2 sidebar"
       "content content sidebar"
       "content content sidebar"
       "footer footer footer"
       ;
    }
    .items {
      text-align: center;
      color: white;
      font-size: large;
    }
    .header {
      background: orangered;
      grid-area: header;
      /* grid-area: 1/1/2/4; */
    }
    .menu {
      background: greenyellow;
      grid-area: menu;
      /* grid-area: 2/1/2/4; */
    }
    .box1 {
      background: hotpink;
      grid-area: box1;
      /* grid-area: reapt(3, 1fr); */
    }
    .box2 {
      background: rgb(236, 186, 120);
      grid-area: box2;
      /* grid-area: 3/2/4/3; */
    }
    .sidebar {
      background: rgb(44, 108, 226);
      grid-area: sidebar;
      /* grid-area: 3/3/6/4; */
    }
    .content {
      background: blueviolet;
      grid-area: content;
      /* grid-area: 4/1/6/3; */
    }
    .footer {
      background: orange;
      grid-area: footer;
      /* grid-area: 6/1/6/4; */
      height: 50px;
    }
  </style>
  <body>
    <div class="container">
      <div class="items header">header</div>
      <div class="items menu">menu</div>
      <div class="items box1">box1</div>
      <div class="items box2">box2</div>
      <div class="items sidebar">sidebar</div>
      <div class="items content">content</div>
      <div class="items footer">footer</div>
    </div>
  </body>
</html>
</body>
</html>
