<body>
    <script>
        let a=prompt("enter a number1")
        let b=prompt("enter a number2")

        console.log("square of num1:"+(a*a));
        console.log("square of num2:"+(b*b));

        console.log("cube of num1:"+(a*a*a));
        console.log("cube of num2:"+(b*b*b));

        if (a > b){
            console.log("a is greater number"+a)
        }
        else if(b > a){
            console.log("b is greater number"+b)
        }
        else{
            console.log("both number are  equal:"+a ,"and",+b)
        }
    </script>
